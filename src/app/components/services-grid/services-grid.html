<section class="py-xl bg-surface">
  <div class="max-w-container-max mx-auto px-gutter">
    <h2 class="font-headline-md text-headline-md text-primary mb-xl text-center" appReveal>
      Nuestras soluciones hipotecarias
    </h2>
    <div class="bento-grid">
      @for (service of services; track service.title) {
        <div
          class="glass-card p-lg rounded-3xl flex flex-col gap-4"
          appReveal
          [style.transition-delay]="service.delay"
        >
          <span class="material-symbols-outlined text-primary text-4xl">{{ service.icon }}</span>
          <h3 class="font-headline-sm text-primary">{{ service.title }}</h3>
          <p class="text-secondary flex-grow">{{ service.description }}</p>
          <button class="text-primary font-bold flex items-center gap-2 group">
            Saber más
            <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_forward</span>
          </button>
        </div>
      }
    </div>
  </div>
</section>
